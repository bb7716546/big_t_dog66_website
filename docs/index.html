<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big_T_Dog66</title>

  <!-- Orbitron font (cool/futuristic) -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background-color: #0a0a0a;
      color: #e0e0e0;
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #00f5ff, #f700ff);
      padding: 20px 0;
      box-shadow: 0 0 20px #00f5ff;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
      color: white;
      text-shadow: 0 0 10px #00f5ff;
    }

    nav {
      margin: 20px 0;
    }

    nav a {
      color: #00f5ff;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #f700ff;
      text-shadow: 0 0 10px #f700ff;
    }

    .shop {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      padding: 40px;
    }

    .item {
      background-color: #111;
      border: 2px solid #00f5ff;
      border-radius: 10px;
      width: 250px;
      padding: 20px;
      transition: 0.3s;
      box-shadow: 0 0 15px #00f5ff55;
    }

    .item:hover {
      transform: scale(1.05);
      border-color: #f700ff;
      box-shadow: 0 0 20px #f700ff88;
    }

    .item img {
      width: 100%;
      border-radius: 10px;
    }

    .item h3 {
      margin: 15px 0 10px;
    }

    .item button {
      background: linear-gradient(90deg, #00f5ff, #f700ff);
      border: none;
      padding: 10px 20px;
      color: white;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .item button:hover {
      opacity: 0.8;
    }

    footer {
      padding: 20px;
      background-color: #111;
      color: #888;
      font-size: 0.9em;
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Big_T_Dog66</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#shop">Shop</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section id="home">
    <h2>Welcome to Big_T_Dog66</h2>
    <p>Cool gear, gaming style, and custom items made for you.</p>
  </section>

  <section id="shop" class="shop">
    <div class="item">
      <img src="https://via.placeholder.com/250x200?text=Item+1" alt="Item 1">
      <h3>Big_T Hoodie</h3>
      <p>$39.99</p>
      <button>Buy Now</button>
    </div>

    <div class="item">
      <img src="https://via.placeholder.com/250x200?text=Item+2" alt="Item 2">
      <h3>Minecraft Mug</h3>
      <p>$14.99</p>
      <button>Buy Now</button>
    </div>

    <div class="item">
      <img src="https://via.placeholder.com/250x200?text=Item+3" alt="Item 3">
      <h3>Dog66 Cap</h3>
      <p>$24.99</p>
      <button>Buy Now</button>
    </div>
  </section>

  <footer>
    &copy; 2026 Big_T_Dog66. All rights reserved.
  </footer>
</body>
</html>
